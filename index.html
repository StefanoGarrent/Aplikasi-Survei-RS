<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survei Layanan Rawat Jalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center">

    <section id="page-login" class="w-full max-w-md p-8 bg-white rounded-2xl shadow-lg border border-slate-100 fade-in">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600 mb-2">Kasir Rawat Jalan</h1>
            <p class="text-sm text-slate-500">Survei Kepuasan Pelanggan</p>
        </div>
        <div class="space-y-4">
            <div>
                <label for="namaPasien" class="block text-sm font-medium text-slate-700 mb-1">Nama Pasien</label>
                <input type="text" id="namaPasien" placeholder="Masukkan nama Anda..." class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md">
                Lakukan Survei
            </button>
        </div>
        <div class="mt-6 text-center">
            <button id="btn-to-dashboard" class="text-xs text-slate-400 hover:text-blue-500 transition">Lihat Dashboard Admin</button>
        </div>
    </section>

    <section id="page-survey" class="w-full max-w-lg p-8 bg-white rounded-2xl shadow-lg border border-slate-100 hidden-section fade-in">
        <div class="text-center mb-8">
            <h2 class="text-xl font-semibold text-slate-700">Halo, <span id="displayNama" class="text-blue-600"></span>!</h2>
            <p class="text-slate-500 mt-2">Bagaimana pengalaman layanan Anda di Kasir Rawat Jalan hari ini?</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button id="btn-puas" class="flex flex-col items-center justify-center p-6 border-2 border-emerald-100 bg-emerald-50 hover:bg-emerald-100 hover:border-emerald-300 rounded-xl transition duration-200 group">
                <span class="text-5xl mb-3 group-hover:scale-110 transition-transform">😊</span>
                <span class="font-semibold text-emerald-700">Sangat Puas</span>
            </button>
            <button id="btn-tidak-puas" class="flex flex-col items-center justify-center p-6 border-2 border-rose-100 bg-rose-50 hover:bg-rose-100 hover:border-rose-300 rounded-xl transition duration-200 group">
                <span class="text-5xl mb-3 group-hover:scale-110 transition-transform">😞</span>
                <span class="font-semibold text-rose-700">Tidak Puas</span>
            </button>
        </div>
        <div id="loadingIndicator" class="hidden text-center mt-6 text-sm text-blue-500 font-medium">
            Mengirim data survei Anda...
        </div>
    </section>

    <section id="page-dashboard" class="w-full max-w-3xl p-8 bg-white rounded-2xl shadow-lg border border-slate-100 hidden-section fade-in">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Dashboard Kepuasan</h2>
                <p class="text-sm text-slate-500">Real-time data dari Spreadsheet</p>
            </div>
            <button id="btn-back" class="text-sm px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition text-slate-600">Kembali</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                <p class="text-sm text-blue-600 font-semibold mb-1">Total Responden</p>
                <h3 id="statTotal" class="text-3xl font-bold text-blue-800">0</h3>
            </div>
            <div class="bg-emerald-50 p-6 rounded-xl border border-emerald-100">
                <p class="text-sm text-emerald-600 font-semibold mb-1">Puas</p>
                <h3 id="statPuas" class="text-3xl font-bold text-emerald-800">0</h3>
            </div>
            <div class="bg-rose-50 p-6 rounded-xl border border-rose-100">
                <p class="text-sm text-rose-600 font-semibold mb-1">Tidak Puas</p>
                <h3 id="statTidakPuas" class="text-3xl font-bold text-rose-800">0</h3>
            </div>
        </div>

        <div class="w-full max-w-sm mx-auto">
            <canvas id="kepuasanChart"></canvas>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
